<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          var storedTheme = localStorage.getItem('assetflow-theme');
          var theme = 'dark';
          if (storedTheme === 'light' || storedTheme === 'dark') {
            theme = storedTheme;
          } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            theme = 'dark';
          } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
            theme = 'light';
          }
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AssetFlow — Enterprise Asset & Resource Management System. Sign in to manage assets, bookings, maintenance, and audits across your organization."
    />
    <title>AssetFlow — Sign In</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
